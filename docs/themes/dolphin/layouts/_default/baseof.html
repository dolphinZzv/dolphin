<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Params.description | default .Site.Params.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" type="image/svg+xml" href="/img/dolphin.svg">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js" defer></script>
  {{ block "extrahead" . }}{{ end }}
</head>
<body>
  {{ partial "nav.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script src="/js/copy.js"></script>
  <script>
    // ── Active TOC tracking ──
    (function() {
      var tocLinks = document.querySelectorAll('.doc-toc nav a');
      if (tocLinks.length) {
        var headings = [];
        tocLinks.forEach(function(link) {
          var href = link.getAttribute('href');
          if (href && href.startsWith('#')) {
            var el = document.getElementById(href.slice(1));
            if (el) headings.push({ el: el, link: link });
          }
        });
        if (headings.length) {
          var observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
              if (entry.isIntersecting) {
                tocLinks.forEach(function(l) { l.classList.remove('active'); });
                var matched = headings.find(function(h) { return h.el === entry.target; });
                if (matched) matched.link.classList.add('active');
              }
            });
          }, { rootMargin: '-80px 0px -60% 0px' });
          headings.forEach(function(h) { observer.observe(h.el); });
        }
      }
    })();

    // ── Theme switcher ──
    (function() {
      var root = document.documentElement;
      var mermaidDark = false;

      function applyTheme(t) {
        root.classList.remove('theme-auto', 'theme-light', 'theme-dark');
        root.classList.add('theme-' + t);
        localStorage.setItem('dolphin-theme', t);
        mermaidDark = t === 'dark' || (t === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        updateMermaidTheme();
        document.querySelectorAll('.theme-btn').forEach(function(btn) {
          btn.classList.toggle('active', btn.dataset.theme === t);
        });
      }

      function updateMermaidTheme() {
        if (typeof mermaid !== 'undefined') {
          mermaid.initialize({
            theme: mermaidDark ? 'dark' : 'base',
            themeVariables: { fontFamily: 'inherit' }
          });
          document.querySelectorAll('.mermaid').forEach(function(el) {
            el.removeAttribute('data-processed');
          });
          mermaid.run();
        }
      }

      var theme = localStorage.getItem('dolphin-theme') || 'auto';
      applyTheme(theme);

      document.querySelectorAll('.theme-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          applyTheme(this.dataset.theme);
        });
      });
    })();
  </script>
</body>
</html>

version: "2"
# golangci-lint configuration for dolphin
# Requires golangci-lint v2.9+ (go 1.26 support)
# Install: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
# Run:    golangci-lint run ./...

linters:
  default: none

  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - nilerr
    - bodyclose
    - durationcheck
    - copyloopvar
    - gosec
    - goconst
    - misspell
    - revive
    - unconvert
    - gocyclo
    - gocritic

  settings:
    govet:
      enable:
        - asmdecl
        - assign
        - atomic
        - atomicalign
        - bools
        - buildtag
        - cgocall
        - composites
        - copylocks
        - httpresponse
        - loopclosure
        - lostcancel
        - nilfunc
        - printf
        - shift
        - shadow
        - stdmethods
        - structtag
        - tests
        - unmarshal
        - unreachable
        - unsafeptr
        - unusedresult

    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprint
        - fmt.Println
        - fmt.Printf
        - fmt.Scanf
        - (net/http.ResponseWriter).Write
        - (*os.File).Close
        - (io.Closer).Close

    gosec:
      excludes:
        - G101
        - G304
        - G108

    goconst:
      min-len: 3
      min-occurrences: 5

    gocyclo:
      min-complexity: 20

    revive:
      rules:
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: var-declaration
        - name: unexported-return
        - name: time-naming
        - name: errorf

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - unnamedResult
        - importShadow
        - paramTypeCombine
        - typeAssertChain

    staticcheck:
      checks:
        - "all"
        - "-SA9003"
        - "-SA4006"
        - "-QF1002"
        - "-QF1003"

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 50
  max-same-issues-per-linter: 5

  exclude-dirs:
    - vendor
    - tests
    - third_party

  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - goconst
        - govet
        - revive

    - path: ".*_gen\\.go"
      linters:
        - govet
        - staticcheck
        - revive

    - linters:
        - errcheck
      source: "defer .*\\.Close\\(\\)"

    - path: internal/agent/coordinator\.go
      linters:
        - nilerr

    - path: internal/mcp/cdp/cdp\.go
      linters:
        - nilerr

    - path: internal/mcp/email/email\.go
      linters:
        - nilerr

    - path: internal/transport/mqtt_broker_test\.go
      linters:
        - errcheck